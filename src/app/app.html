<router-outlet />

@if (showSignInOverlay()) {
  <div class="sign-in-overlay" role="dialog" aria-modal="true" aria-label="Sign in">
    <div class="sign-in-overlay__backdrop" (click)="closeOverlay()"></div>
    <div class="sign-in-overlay__panel">
      <button type="button" class="sign-in-overlay__close" aria-label="Close" (click)="closeOverlay()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <p class="sign-in-overlay__title">Sign in</p>
      <button type="button" class="sign-in-overlay__btn" (click)="signInWithGoogle()">
        Sign in with Google
      </button>
    </div>
  </div>
}
