<app-theme-accent />
<div class="layout-spine" aria-hidden="true"></div>
<div class="layout-spine-beam" aria-hidden="true"></div>
<nav class="layout-nav">
  <div class="layout-nav__inner">
    <a routerLink="/" routerLinkActive="layout-nav__link--active" [routerLinkActiveOptions]="{ exact: true }"
       class="layout-nav__link">
      Home
    </a>
    <a routerLink="/experience" routerLinkActive="layout-nav__link--active"
       class="layout-nav__link">
      Experience
    </a>
    <a routerLink="/projects" routerLinkActive="layout-nav__link--active"
       class="layout-nav__link">
      Projects
    </a>
    <a routerLink="/skills" routerLinkActive="layout-nav__link--active"
       class="layout-nav__link">
      Skills
    </a>
    <div class="layout-nav__btn-group">
      @if (cvUrl()) {
        <button
          type="button"
          class="layout-nav__icon-btn"
          title="Download CV"
          aria-label="Download CV"
          (click)="openInNewTab(cvUrl()!)"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        </button>
      }
      @if (resumeUrl()) {
        <button
          type="button"
          class="layout-nav__icon-btn"
          title="Download Resume"
          aria-label="Download Resume"
          (click)="openInNewTab(resumeUrl()!)"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="11" x2="8" y2="11"/>
            <line x1="12" y1="15" x2="8" y2="15"/>
          </svg>
        </button>
      }
      <a
        href="https://linkedin.com/in/pcrews78916211"
        target="_blank"
        rel="noopener noreferrer"
        class="layout-nav__icon-btn"
        title="LinkedIn"
        aria-label="LinkedIn"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>
  </div>
</nav>

<main class="layout-main">
  <router-outlet />
</main>
