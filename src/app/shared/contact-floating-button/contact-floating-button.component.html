<div class="contact-floating">
  <div class="contact-floating__trigger-wrap">
    @if (dropdownOpen()) {
      <div
        class="contact-floating__backdrop"
        (click)="onBackdropClick($event)"
        aria-hidden="true"
      ></div>
      <div class="contact-floating__dropdown" role="menu">
        <a
          href="mailto:pcrews.employ@gmail.com"
          class="contact-floating__option"
          role="menuitem"
          (click)="closeDropdown()"
        >
          <span class="contact-floating__icon">✉</span>
          Send an email
        </a>
        <a
          [href]="scheduleMailtoUrl"
          class="contact-floating__option"
          role="menuitem"
          (click)="closeDropdown()"
        >
          <span class="contact-floating__icon">📅</span>
          Schedule a call
        </a>
        <button type="button" class="contact-floating__option" (click)="openModal('cover-letter')" role="menuitem">
          <span class="contact-floating__icon">📄</span>
          Download Cover Letter
        </button>
        <button type="button" class="contact-floating__option" (click)="openModal('resume')" role="menuitem">
          <span class="contact-floating__icon">📥</span>
          Download Resume
        </button>
        <a
          href="https://linkedin.com/in/pcrews78916211"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-floating__option"
          role="menuitem"
          (click)="closeDropdown()"
        >
          <span class="contact-floating__icon contact-floating__icon--linkedin">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </span>
          LinkedIn
        </a>
      </div>
    }
    <button
      type="button"
      class="contact-floating__btn"
      (click)="toggleDropdown()"
      [attr.aria-expanded]="dropdownOpen()"
      aria-label="Contact options"
      title="Contact"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
  </div>

  @switch (activeModal()) {
    @case ('cover-letter') {
      @if (siteConfig()) {
        <app-cover-letter-modal
          [isOpen]="true"
          [siteConfig]="siteConfig()!"
          (closed)="closeModal()"
        />
      }
    }
    @case ('resume') {
      <app-download-resume-modal
        [isOpen]="true"
        [resumeUrl]="resumeUrl()"
        (closed)="closeModal()"
      />
    }
  }
</div>
