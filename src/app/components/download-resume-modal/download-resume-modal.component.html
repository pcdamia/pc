@if (isOpen()) {
  <div class="contact-modal__backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true" aria-labelledby="resume-modal-title">
    <div class="contact-modal">
      <div class="contact-modal__header">
        <h2 id="resume-modal-title" class="contact-modal__title">Download Resume</h2>
        <button type="button" class="contact-modal__close" (click)="close()" aria-label="Close">×</button>
      </div>
      <div class="contact-modal__body">
        @if (resumeUrl()) {
          <p class="contact-modal__text">Click below to download my resume.</p>
          <button type="button" class="contact-modal__btn contact-modal__btn--primary" (click)="download()">
            Download PDF
          </button>
        } @else {
          <p class="contact-modal__text contact-modal__text--muted">Resume is not available at the moment.</p>
        }
      </div>
    </div>
  </div>
}
