<section class="hero">
  <div class="hero__systems-map" aria-hidden="true">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hero-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="0.5" fill="currentColor" opacity="0.15"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hero-dots)"/>
      <line x1="50" y1="0" x2="50" y2="400" stroke="currentColor" stroke-width="0.5" opacity="0.08"/>
      <line x1="150" y1="100" x2="350" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.06"/>
      <line x1="200" y1="200" x2="350" y2="250" stroke="currentColor" stroke-width="0.5" opacity="0.06"/>
      <line x1="100" y1="300" x2="250" y2="350" stroke="currentColor" stroke-width="0.5" opacity="0.06"/>
    </svg>
  </div>

  <div class="hero__grid">
    <div class="hero__content">
      <h1 class="hero__name">{{ siteConfig().name }}</h1>
      <h2 class="hero__title">{{ siteConfig().title }}</h2>

      <div class="hero__description-card">
        <p class="hero__statement">{{ siteConfig().positioningStatement }}</p>
        <p class="hero__summary">{{ siteConfig().strategicSummary }}</p>
      </div>

      <div class="hero__metrics">
        @for (metric of siteConfig().metrics ?? []; track metric.label) {
          <div class="hero__metric">
            <div class="hero__metric-value">{{ metric.value }}</div>
            <div class="hero__metric-label">{{ metric.label }}</div>
          </div>
        }
      </div>

      <div class="hero__ctas">
        <a routerLink="/experience" class="hero__btn hero__btn--outline">
          View Experience
        </a>
        <a routerLink="/projects" class="hero__btn hero__btn--outline">
          View Projects
        </a>
      </div>
    </div>

    @if (siteConfig().headshotUrl) {
      <div class="hero__headshot-wrap">
        <div class="hero__headshot-frame">
          <img
            [src]="siteConfig().headshotUrl"
            [alt]="siteConfig().name"
            class="hero__headshot"
          />
        </div>
      </div>
    }
  </div>
</section>
